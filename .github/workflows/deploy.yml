name: Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run --cwd packages/database db:generate

      - name: Run unit tests
        run: bun run test

  deploy:
    name: Deploy to Production
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            cd /home/paiva/reformai
            git pull origin main
            ./scripts/deploy.sh

      - name: Health check
        run: |
          echo "Aguardando app inicializar..."
          sleep 10
          for i in $(seq 1 12); do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://app.reformai.com.br/api/health || echo "000")
            if [ "$status" = "200" ]; then
              echo "✓ App respondendo (HTTP $status)"
              exit 0
            fi
            echo "  tentativa $i/12 — HTTP $status, aguardando 5s..."
            sleep 5
          done
          echo "✗ Health check falhou após 60s"
          exit 1
